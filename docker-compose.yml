services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: apparel_app
    working_dir: /var/www
    volumes:
      - ./src:/var/www

  nginx:
    image: nginx:latest
    container_name: apparel_nginx
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: apparel_mysql
    environment:
      MYSQL_DATABASE: apparel_ec
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: